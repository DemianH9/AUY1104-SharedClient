name: Pipeline del Cliente API

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v.*.*.*'

jobs:
  llamar-pipeline-api:
    # Aquí llamo al NUEVO workflow que cree en el productor
    uses: DemianH9/AUY1104-SharedWorkflows/.github/workflows/deploy-api.yml@main
    with:
      # Le pasamos el nombre que queremos para la nueva imagen
      image_name: "mi-app-api-nueva" 
    secrets:
      # Le pasamos las credenciales que ya configuraste antes en GitHub
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}